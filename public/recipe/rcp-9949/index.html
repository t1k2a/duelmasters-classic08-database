  <script>
function shareCard() {
  var url = "https://t1k2a.github.io/duelmasters-classic08-database/recipe/rcp-9949/";
  var title = "マーシャル専用デッキ — デッキレシピ | デュエマ クラシック08";
  if (navigator.share) {
    navigator.share({ title: title, text: title, url: url }).catch(function () {});
    return;
  }
  if (!navigator.clipboard) {
    showToast('この環境では共有に対応していません');
    return;
  }
  navigator.clipboard.writeText(title + '\n' + url)
    .then(function () { showToast('共有URLをコピーしました'); })
    .catch(function () { showToast('コピーに失敗しました'); });
}
function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(function () { t.classList.add('hidden'); }, 2000);
}
</script>
