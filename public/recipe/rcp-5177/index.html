function shareCard() {
  var url = "https://t1k2a.github.io/duelmasters-classic08-database/recipe/rcp-5177/";
  var title = "ワラワラ出すのが好きなんです — デッキレシピ | デュエマ クラシック08";
  if (navigator.share) {
    navigator.share({ title: title, text: title, url: url }).catch(function () {});
    return;
  }
  navigator.clipboard.writeText(title + '\n' + url)
    .then(function () { showToast('共有URLをコピーしました'); })
    .catch(function () { showToast('コピーに失敗しました'); });
}
function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(function () { t.classList.add('hidden'); }, 2000);
}
