<script>
// ローカルLLMチャットAPI（ngrok経由）。ユーザーが自分の固定ドメインに差し替える。
let CHAT_API_BASE = 'https://YOUR-DOMAIN.ngrok-free.app'; // ← ngrok固定ドメインに差し替え
// ?chatApi= で一時的に上書き可能（差し替え前の動作確認・E2E用）
try {
  const _ca = new URLSearchParams(location.search).get('chatApi');
  if (_ca) CHAT_API_BASE = _ca;
} catch {}
const CHAT_HEADERS = { 'ngrok-skip-browser-warning': 'true' };

const RENDER_PAGE = 100;
let renderOffset = 0;
let lastResults = [];
let CARDS = [];
let DM_SET_MAP = new Map();
let HOF_MAP = new Map();
let hofLoaded = false;
let RECIPES = [];
const CIV_COLORS = {光:'civ-光',水:'civ-水',闇:'civ-闇',火:'civ-火',自然:'civ-自然'};
let selectedCard = null;
let mobileCivFilter = new Set(['光','水','闇','火','自然']);
let debounceTimer = null;
let urlTimer = null;
const VIEW_KEY = 'dm_view_mode';
let viewMode = localStorage.getItem(VIEW_KEY) === 'grid' ? 'grid' : 'list';

function buildSetMap(cards) {
  const map = new Map();
  for (const card of cards) {
    for (const s of card.setsContaining) {
      const m = s.match(/^(DM-\d+)/);
      if (m && !map.has(m[1])) map.set(m[1], s);
    }
    for (const pr of card.printings) {
      if (pr.setCode && !map.has(pr.setCode)) map.set(pr.setCode, pr.setCode);
    }
  }
  return map;
}

function setShortName(setCode) {
  const full = DM_SET_MAP.get(setCode) || setCode;
  return full.replace(/^DM-\d+\s*/, '');
}

function populateSetSelects() {
  const opts = Array.from(DM_SET_MAP.entries())
    .filter(([c]) => /^DM-\d+$/.test(c))
    .sort((a, b) => parseInt(a[0].slice(3)) - parseInt(b[0].slice(3)))
    .map(([code, name]) => `<option value="${code}">${name}</option>`)
    .join('');
  document.getElementById('mobileSetFilter').insertAdjacentHTML('beforeend', opts);
}

function populateRaceSelect() {
  const races = new Set();
  for (const card of CARDS) {
    for (const r of card.races) races.add(r);
  }
  const opts = Array.from(races)
    .sort((a, b) => a.localeCompare(b, 'ja'))
    .map(r => `<option value="${r}">${r}</option>`)
    .join('');
  document.getElementById('mobileRaceFilter').insertAdjacentHTML('beforeend', opts);
}

fetch('cards.json')
  .then(r => r.json())
  .then(data => {
    CARDS = data;
    CARDS.forEach(c => { c._kana = normalizeKana(c.name); })
    DM_SET_MAP = buildSetMap(CARDS);
    populateSetSelects();
    populateRaceSelect();
    document.getElementById('loadingMsg')?.remove();
    document.getElementById('cardCountBadge').textContent = `${CARDS.length.toLocaleString()} 枚収録`;
    applyURLParams();
    updateViewButtons();
    renderTodayPick();
    renderList();
    restoreDeckFromURL();
  })
  .catch(() => {
    document.getElementById('loadingMsg').textContent = '読み込みに失敗しました。';
  });

fetch('data/hall-of-fame.json')
  .then(r => r.json())
  .then(list => {
    HOF_MAP = new Map(list.map(e => [e.name, e.status]));
    hofLoaded = true;
    if (CARDS.length) {
      renderList();
      if (selectedCard) {
        const c = CARDS.find(x => x.id === selectedCard);
        if (c && !document.getElementById('mobileDetail').classList.contains('hidden')) {
          document.getElementById('detailName').innerHTML = detailNameHTML(c);
        }
      }
    }
  })
  .catch(() => { /* 殿堂データが無くてもカード検索は動作する */ });

function isHofReady() {
  return hofLoaded && HOF_MAP.size > 0;
}

fetch('data/recipes.json')
  .then(r => r.json())
  .then(data => {
    RECIPES = Array.isArray(data) ? data : [];
    // 詳細モーダルが開いていればレシピ件数を反映して再描画
    if (selectedCard && !document.getElementById('mobileDetail').classList.contains('hidden')) {
      const c = CARDS.find(x => x.id === selectedCard);
      if (c) document.getElementById('detailBody').innerHTML = detailHTML(c);
    }
  })
  .catch(() => { RECIPES = []; });

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function currentSearchTerm() {
  return document.getElementById('textSearch').value.trim();
}

// escapeHtml 済みの文字列に対して検索語をハイライト。term は生文字列。
function highlight(escapedHtml, term) {
  if (!term) return escapedHtml;
  const escTerm = escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (!escTerm) return escapedHtml;
  return escapedHtml.replace(new RegExp(escTerm, 'gi'),
    m => `<mark class="bg-yellow-200 rounded">${m}</mark>`);
}

function hofBadge(name) {
  const status = HOF_MAP.get(name);
  if (!status) return '';
  if (status === '殿堂') return `<span title="殿堂入り（1枚制限）">🏅</span>`;
  if (status === 'プレ殿') return `<span title="プレミアム殿堂（使用禁止）">🚫</span>`;
  return '';
}

function civBadge(civs) {
  return civs.map(c =>
    `<span class="${CIV_COLORS[c]||''} border rounded-full px-2 py-0.5 text-xs">${c}</span>`
  ).join(' ');
}

function rarityClass(r) { return `rarity-${r}`; }

function normalizeKana(s) {
  return (s || '')
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
    .replace(/[・\s]/g, '');
}

function getFilters() {
  const text = document.getElementById('textSearch').value.trim();
  const kana = normalizeKana(text);
  const civs = [...mobileCivFilter];
  const costVal = document.getElementById('mobileCostMax').value || '';
  const costParts = costVal ? costVal.split(':') : [];
  const costFilter = costVal ? { mode: costParts[0], n: parseInt(costParts[1]), n2: parseInt(costParts[2]) } : null;
  const type = document.getElementById('mobileCardType').value || '';
  const setCode = document.getElementById('mobileSetFilter').value || '';
  const race = document.getElementById('mobileRaceFilter').value || '';
  const powerVal = document.getElementById('powerFilter').value || '';
  const powerParts = powerVal ? powerVal.split(':') : [];
  const powerFilter = powerVal ? { mode: powerParts[0], n: parseInt(powerParts[1]), n2: parseInt(powerParts[2]) } : null;
  const rarity = document.getElementById('rarityFilter').value || '';
  const ability = document.getElementById('abilityFilter').value || '';
  return { text, kana, civs, costFilter, type, setCode, race, powerFilter, rarity, ability };
}

function filterCards() {
  const { text, kana, civs, costFilter, type, setCode, race, powerFilter, rarity, ability } = getFilters();
  return CARDS.filter(c => {
    if (text && !c._kana.includes(kana) && !(c.text || '').toLowerCase().includes(text.toLowerCase())) return false;
    if (civs.length && !c.civilizations.some(cv => civs.includes(cv))) return false;
    if (costFilter) {
      if (costFilter.mode === 'max' && c.cost !== null && c.cost > costFilter.n) return false;
      if (costFilter.mode === 'min' && (c.cost === null || c.cost < costFilter.n)) return false;
      if (costFilter.mode === 'range' && (c.cost === null || c.cost < costFilter.n || c.cost > costFilter.n2)) return false;
    }
    if (type && c.cardType !== type) return false;
    if (setCode && !c.printings.some(p => p.setCode === setCode)) return false;
    if (race && !c.races.includes(race)) return false;
    if (powerFilter) {
      if (c.power === null) return false;
      if (powerFilter.mode === 'max' && c.power > powerFilter.n) return false;
      if (powerFilter.mode === 'min' && c.power < powerFilter.n) return false;
      if (powerFilter.mode === 'range' && (c.power < powerFilter.n || c.power > powerFilter.n2)) return false;
    }
    if (rarity && c.rarity !== rarity) return false;
    if (ability && !(c.text || '').includes(ability)) return false;
    return true;
  });
}

const RARITY_ORDER = { SR: 0, VR: 1, R: 2, U: 3, C: 4 };

function sortCards(cards) {
  const key = document.getElementById('sortKey').value;
  const desc = document.getElementById('sortDir').value === 'desc';
  if (!key) return cards;
  return [...cards].sort((a, b) => {
    let av, bv;
    if (key === 'name')   { av = a.name; bv = b.name; }
    if (key === 'cost')   { av = a.cost ?? 99; bv = b.cost ?? 99; }
    if (key === 'power')  { av = a.power ?? -1; bv = b.power ?? -1; }
    if (key === 'rarity') { av = RARITY_ORDER[a.rarity] ?? 9; bv = RARITY_ORDER[b.rarity] ?? 9; }
    if (av < bv) return desc ? 1 : -1;
    if (av > bv) return desc ? -1 : 1;
    return 0;
  });
}

// ---- レシピ推薦 ----
function cardById(id) {
  return CARDS.find(c => c.id === id) || null;
}

// validated を優先したカード採用レシピ。0件なら validated 全体から。
function recipesUsingCard(cardId) {
  const usesCard = r => r.cards && r.cards.some(rc => rc.id === cardId);
  const validatedHits = RECIPES.filter(r => r.validated && usesCard(r));
  if (validatedHits.length) return validatedHits;
  return RECIPES.filter(usesCard);
}

// 一次が0件のときの二次候補: 同文明 or 同種族の validated レシピ。
function fallbackRecipes(c) {
  const civs = new Set(c.civilizations || []);
  const races = new Set(c.races || []);
  const pool = RECIPES.filter(r => r.validated);
  const scored = pool.filter(r => {
    if ((r.civilizations || []).some(cv => civs.has(cv))) return true;
    // レシピ内カードの種族が一致するか
    return (r.cards || []).some(rc => {
      const card = cardById(rc.id);
      return card && (card.races || []).some(rr => races.has(rr));
    });
  });
  return scored.slice(0, 6);
}

function recipeCivBadges(civs) {
  return (civs || []).map(cv =>
    `<span class="${CIV_COLORS[cv] || ''} border rounded-full px-2 py-0.5 text-xs">${cv}</span>`
  ).join(' ');
}

function recipeCardHTML(r, highlightId) {
  const total = (r.cards || []).reduce((s, rc) => s + (rc.count || 0), 0);
  const usedCount = highlightId
    ? (r.cards || []).filter(rc => rc.id === highlightId).reduce((s, rc) => s + (rc.count || 0), 0)
    : 0;
  const hofMarks = (r.cards || [])
    .map(rc => { const card = cardById(rc.id); return card ? hofBadge(card.name) : ''; })
    .filter(Boolean);
  const hofLine = hofMarks.length
    ? `<div class="text-xs text-gray-400 mt-1">殿堂カード: ${hofMarks.join(' ')}</div>` : '';
  const adopt = usedCount
    ? `<span class="text-xs text-emerald-700 bg-emerald-50 rounded px-1.5 py-0.5 shrink-0">採用 ${usedCount}枚</span>` : '';
  const srcLink = r.source && r.source.url
    ? `<a href="${escapeHtml(r.source.url)}" target="_blank" rel="noopener noreferrer"
         class="text-xs text-indigo-600 hover:text-indigo-800 hover:underline">出典 →</a>` : '';
  const archetype = r.archetype
    ? `<span class="text-xs text-gray-500 bg-gray-100 rounded px-1.5 py-0.5">${escapeHtml(r.archetype)}</span>` : '';
  return `
    <div class="border border-gray-200 rounded-lg p-3 space-y-2">
      <div class="flex items-start justify-between gap-2">
        <div class="font-semibold text-sm text-gray-900 min-w-0 break-words">${escapeHtml(r.name || '無題のデッキ')}</div>
        ${adopt}
      </div>
      <div class="flex flex-wrap items-center gap-1">
        ${recipeCivBadges(r.civilizations)}
        ${archetype}
      </div>
      <div class="text-xs text-gray-500">${total}枚${r.author ? ` ・ ${escapeHtml(r.author)}` : ''}</div>
      ${hofLine}
      <div class="flex items-center gap-3 pt-1">
        <button onclick="loadRecipe('${escapeHtml(r.id)}')"
          class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-3 py-1 font-medium">読込</button>
        <button onclick="copyRecipeURL('${escapeHtml(r.id)}')"
          class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg px-3 py-1 font-medium">URLをコピー</button>
        ${srcLink}
      </div>
    </div>`;
}

function recipeButtonHTML(c) {
  if (!RECIPES.length) return '';
  const n = recipesUsingCard(c.id).length;
  const label = n
    ? `📋 このカードを使うデッキを見る（${n}件）`

function selectCard(id, fromDeck = false) {
  const c = CARDS.find(x => x.id === id);
  if (!c) return;
  selectedCard = id;
  renderList();
  document.getElementById('deckPanel').classList.add('hidden');
  document.getElementById('detailName').innerHTML = detailNameHTML(c);
  document.getElementById('detailBody').innerHTML = detailHTML(c);
  document.getElementById('backToDeckBtn').classList.toggle('hidden', !fromDeck);
  document.getElementById('mobileDetail').classList.remove('hidden');
}

function backToDeck() {
  document.getElementById('mobileDetail').classList.add('hidden');
  document.getElementById('deckPanel').classList.remove('hidden');
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('mobileDetail')) {
    document.getElementById('mobileDetail').classList.add('hidden');
  }
}

function toggleMobileCiv(btn, civ) {
  if (mobileCivFilter.has(civ)) {
    mobileCivFilter.delete(civ);
    btn.classList.add('opacity-30');
  } else {
    mobileCivFilter.add(civ);
    btn.classList.remove('opacity-30');
  }
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderList, 200);
  clearTimeout(urlTimer);
  urlTimer = setTimeout(syncURL, 600);
}

function syncURL() {
  const params = new URLSearchParams(location.search);
  const set = (k, v) => { if (v) params.set(k, v); else params.delete(k); };
  const text = document.getElementById('textSearch').value.trim();
  const civs = [...mobileCivFilter];
  // 全文明ON（デフォルト）のときは civs を省略
  const civsParam = civs.length === 5 ? '' : civs.join(',');
  set('q', text);
  set('civs', civsParam);
  set('type', document.getElementById('mobileCardType').value);
  set('cost', document.getElementById('mobileCostMax').value);
  set('race', document.getElementById('mobileRaceFilter').value);
  set('set', document.getElementById('mobileSetFilter').value);
  set('power', document.getElementById('powerFilter').value);
  set('rarity', document.getElementById('rarityFilter').value);
  set('ability', document.getElementById('abilityFilter').value);
  set('sortKey', document.getElementById('sortKey').value);
  set('sortDir', document.getElementById('sortDir').value === 'asc' ? '' : 'desc');
  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
}

function applyURLParams() {
  const params = new URLSearchParams(location.search);
  if (params.has('q')) document.getElementById('textSearch').value = params.get('q');
  if (params.has('type')) document.getElementById('mobileCardType').value = params.get('type');
  if (params.has('cost')) document.getElementById('mobileCostMax').value = params.get('cost');
  if (params.has('race')) document.getElementById('mobileRaceFilter').value = params.get('race');
  if (params.has('set')) document.getElementById('mobileSetFilter').value = params.get('set');
  if (params.has('power')) document.getElementById('powerFilter').value = params.get('power');
  if (params.has('rarity')) document.getElementById('rarityFilter').value = params.get('rarity');
  if (params.has('ability')) document.getElementById('abilityFilter').value = params.get('ability');
  if (params.has('sortKey')) document.getElementById('sortKey').value = params.get('sortKey');
  if (params.has('sortDir')) document.getElementById('sortDir').value = params.get('sortDir') === 'desc' ? 'desc' : 'asc';
  if (params.has('civs')) {
    const wanted = new Set(params.get('civs').split(',').filter(Boolean));
    document.querySelectorAll('#mobileCivTags button[data-civ]').forEach(btn => {
      const civ = btn.dataset.civ;
      const shouldBeOn = wanted.has(civ);
      const isOn = mobileCivFilter.has(civ);
      if (shouldBeOn !== isOn) toggleMobileCiv(btn, civ);
    });
  }
  // ?id=xxx で開かれた場合は該当カード詳細を開く（静的OGPページからのリダイレクト先）
  if (params.has('id')) selectCard(params.get('id'));
}

['textSearch','mobileCardType','mobileCostMax','mobileSetFilter','mobileRaceFilter','powerFilter','rarityFilter','abilityFilter','sortKey','sortDir']
  .forEach(id => document.getElementById(id)?.addEventListener('input', scheduleUpdate));

// ---- デッキビルダー ----
const DECK_KEY = 'dm_deck';
const DECK_MAX = 40;
const CARD_MAX = 4;
let deck = [];

function loadDeck() {
  try {
    const raw = localStorage.getItem(DECK_KEY);
    deck = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(deck)) deck = [];
  } catch { deck = []; }
}

function saveDeck() {
  localStorage.setItem(DECK_KEY, JSON.stringify(deck));
}

function deckTotalCount() {
  return deck.reduce((s, e) => s + e.count, 0);
}

function addToDeck(id) {
  const card = CARDS.find(c => c.id === id);
  if (!card) return;
  if (deckTotalCount() >= DECK_MAX) { showToast('デッキは40枚までです'); return; }
  const entry = deck.find(e => e.id === id);
  if (entry) {
    if (entry.count >= CARD_MAX) { showToast('同じカードは4枚までです'); return; }
    entry.count++;
  } else {
    deck.push({ id, name: card.name, count: 1 });
  }
  saveDeck();
  renderDeckBadge();
  if (!document.getElementById('deckPanel').classList.contains('hidden')) renderDeckPanel();
  showToast(`${card.name} を追加`);
}

function removeFromDeck(id) {
  const entry = deck.find(e => e.id === id);
  if (!entry) return;
  entry.count--;
  if (entry.count <= 0) deck = deck.filter(e => e.id !== id);
  saveDeck();
  renderDeckBadge();
  renderDeckPanel();
}

function clearDeck() {
  deck = [];
  saveDeck();
  renderDeckBadge();
  renderDeckPanel();
}

function renderDeckBadge() {
  const total = deckTotalCount();
  const fab = document.getElementById('deckFab');
  document.getElementById('deckCountBadge').textContent = total;
  fab.classList.remove('hidden');
}

function civCounts() {
  const counts = { 光: 0, 水: 0, 闇: 0, 火: 0, 自然: 0 };
  for (const e of deck) {
    const card = CARDS.find(c => c.id === e.id);
    if (!card) continue;
    for (const civ of card.civilizations) {
      if (counts[civ] !== undefined) counts[civ] += e.count;
    }
  }
  return counts;
}

function renderDeckPanel() {
  const total = deckTotalCount();
  document.getElementById('deckTotal').textContent = `${total} / ${DECK_MAX}`;

  const counts = civCounts();
  const maxCiv = Math.max(1, ...Object.values(counts));
  document.getElementById('deckCivBars').innerHTML = Object.entries(counts).map(([civ, n]) => `
    <div class="flex items-center gap-2 text-xs">
      <span class="${CIV_COLORS[civ]} border rounded px-1.5 w-7 text-center">${civ}</span>
      <div class="flex-1 bg-gray-100 rounded h-3 overflow-hidden">
        <div class="${CIV_COLORS[civ]} h-3" style="width:${(n / maxCiv) * 100}%"></div>
      </div>
      <span class="w-6 text-right text-gray-500">${n}</span>
    </div>
  `).join('');

  const listEl = document.getElementById('deckCardList');
  if (!deck.length) {
    listEl.innerHTML = `
      <div class="py-6 px-4 text-center text-gray-400 text-sm space-y-3">
        <div class="text-3xl">🃏</div>
        <div class="font-medium text-gray-500">デッキは空です</div>
        <div class="text-left bg-gray-50 rounded-xl p-4 space-y-2 text-xs text-gray-500">
          <div class="font-semibold text-gray-600 mb-1">デッキの作り方</div>
          <div>① カードをタップして詳細を開く</div>
          <div>② 「＋ デッキに追加」をタップ</div>
          <div>③ 右下の 🃏 ボタンでデッキを確認</div>
          <div>④「デッキを共有」で URL をコピーして友達に送れるよ</div>
        </div>
      </div>`;
    return;
  }
  listEl.innerHTML = deck.map(e => `
    <div class="flex items-center gap-2 py-1.5 text-sm">
      <div class="relative shrink-0 w-9 h-[52px]">
        <img
          src="https://dm.takaratomy.co.jp/wp-content/card/cardimage/${e.id}.jpg"
          alt=""
          loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          class="w-9 h-[52px] object-cover rounded shadow-sm">
        <div style="display:none" class="w-9 h-[52px] rounded bg-gray-100 items-center justify-center text-gray-300 text-base">🎴</div>
      </div>
      <span class="flex-1 truncate cursor-pointer hover:text-indigo-600 leading-tight" onclick="selectCard('${e.id}', true)">${escapeHtml(e.name)}</span>
      <span class="text-gray-500 shrink-0">×${e.count}</span>
      <button onclick="removeFromDeck('${e.id}')" class="text-red-400 hover:text-red-600 text-lg leading-none shrink-0 w-6">−</button>
    </div>
  `).join('');
}

function openDeckPanel() {
  renderDeckPanel();
  document.getElementById('deckPanel').classList.remove('hidden');
}

function closeDeckPanel(e) {
  if (!e || e.target === document.getElementById('deckPanel')) {
    document.getElementById('deckPanel').classList.add('hidden');
  }
}

// デッキ内の最高レアカードを返す。同レアなら採用枚数が多い方、それも同率なら先頭。
function topRarityCard(deckEntries) {
  let best = null, bestRank = 99, bestCount = -1;
  for (const e of deckEntries) {
    const card = cardById(e.id);
    if (!card) continue;
    const rank = RARITY_ORDER[card.rarity] ?? 9;
    const count = e.count || 0;
    if (rank < bestRank || (rank === bestRank && count > bestCount)) {
      best = card; bestRank = rank; bestCount = count;
    }
  }
  return best;
}

// デッキの説明文（共有テキスト・タイトル用）を組み立てる。
function deckSummaryText(deckEntries) {
  const total = deckEntries.reduce((s, e) => s + (e.count || 0), 0);
  const top = topRarityCard(deckEntries);
  if (top) {
    const rarity = top.rarity ? `【${top.rarity}】` : '';
    return `${rarity}${top.name}入りデッキ（${total}枚）`;
  }
  return `デッキ（${total}枚）`;
}

// カードID（dm06-008 / dm06-s08）を短縮トークン（6-8 / 6-s8）へ変換する。
// 弾番号・通常番号のゼロ埋めを除去し、s番号は s を保持して桁ゼロ埋めを除去する。
function encodeCardId(id) {
  const m = /^dm(\d+)-(s?)(\d+)$/.exec(id);
  if (!m) return null;
  const set = String(parseInt(m[1], 10));
  const num = m[2] + String(parseInt(m[3], 10));
  return `${set}-${num}`;
}

// 短縮トークン（6-8 / 6-s8）をカードID（dm06-008 / dm06-s08）へ復元する。
// 弾は2桁、通常番号は3桁、s番号は2桁でゼロ埋めする。
function decodeCardToken(token) {
  const m = /^(\d+)-(s?)(\d+)$/.exec(token);
  if (!m) return null;
  const set = m[1].padStart(2, '0');
  const num = m[2]
    ? 's' + m[3].padStart(2, '0')
    : m[3].padStart(3, '0');
  return `dm${set}-${num}`;
}

// デッキを ?d=6-8x2.1-52... 形式の文字列へエンコードする（count>1 のみ xN）。
function encodeDeck(deckEntries) {
  return deckEntries
    .map(e => {
      const tok = encodeCardId(e.id);
      if (!tok) return null;
      const count = e.count | 0;
      return count > 1 ? `${tok}x${count}` : tok;
    })
    .filter(Boolean)
    .join('.');
}

// ?d= 形式の文字列を [{id,count}] へデコードする。
// cards.json に存在しないIDや不正トークンは黙ってスキップする。
function decodeDeck(str) {
  return str
    .split('.')
    .map(part => {
      const m = /^(.+?)(?:x(\d+))?$/.exec(part);
      if (!m) return null;
      const id = decodeCardToken(m[1]);
      if (!id || !CARDS.find(c => c.id === id)) return null;
      const count = m[2] ? parseInt(m[2], 10) : 1;
      return { id, count };
    })
    .filter(Boolean);
}

function buildDeckURL() {
  // 共有URLには d のみを載せる（q 等の無関係なクエリは除去する）。
  const encoded = encodeDeck(deck);
  return `${location.origin}${location.pathname}?d=${encoded}`;
}

function shareDeck() {
  if (!deck.length) { showToast('デッキが空です'); return; }
  const url = buildDeckURL();
  const summary = deckSummaryText(deck);
  const text = `${summary}\nデッキのURL: ${url}`;
  if (navigator.share) {
    navigator.share({ title: `${summary} | デュエマ クラシック08`, text: summary, url })
      .catch(() => {/* ユーザーがキャンセルした等は無視 */});
    return;
  }
  navigator.clipboard.writeText(text)
    .then(() => showToast('共有テキストをコピーしました'))
    .catch(() => showToast('コピーに失敗しました'));
}

// deck/recipe をブラウザで開いたとき document.title を動的に更新する。
function updateDeckTitle(deckEntries) {
  if (!deckEntries.length) return;
  document.title = `${deckSummaryText(deckEntries)} | デュエマ クラシック08`;
}

function restoreDeckFromURL() {
  const params = new URLSearchParams(location.search);
  // ?recipe=rcp-XXXX で開かれた場合は該当レシピを読み込む（静的OGPページからのリダイレクト先）
  if (params.has('recipe')) {
    restoreRecipeFromURL(params.get('recipe'));
    return;
  }
  try {
    let decoded = null;
    if (params.has('d')) {
      // 新形式 ?d=6-8x2.1-52...（優先）
      decoded = decodeDeck(params.get('d'));
    } else if (params.has('deck')) {
      // 旧形式 ?deck=<base64(JSON)>（過去URL互換）
      const parsed = JSON.parse(decodeURIComponent(escape(atob(params.get('deck')))));
      decoded = Array.isArray(parsed) ? parsed : null;
    }
    if (!Array.isArray(decoded)) return;
    const restored = decoded
      .filter(e => e && e.id && CARDS.find(c => c.id === e.id))
      .map(e => {
        const card = CARDS.find(c => c.id === e.id);
        return { id: e.id, name: card.name, count: Math.min(CARD_MAX, Math.max(1, e.count | 0)) };
      });
    if (!restored.length) return;
    if (deck.length && !confirm('共有されたデッキを読み込みます。現在のデッキは上書きされます。よろしいですか？')) return;
    deck = restored;
    saveDeck();
    renderDeckBadge();
    updateDeckTitle(deck);
    openDeckPanel();
  } catch { /* 不正な deck/d param は無視 */ }
}

// 静的レシピページからのリダイレクト（?recipe=rcp-XXXX）でレシピを開く。
function restoreRecipeFromURL(recipeId) {
  const apply = () => {
    const recipe = RECIPES.find(r => r.id === recipeId);
    if (!recipe) return false;
    deck = (recipe.cards || [])
      .map(rc => {
        const card = cardById(rc.id);
        if (!card) return null;
        return { id: rc.id, name: card.name, count: Math.min(CARD_MAX, Math.max(1, rc.count | 0)) };
      })
      .filter(Boolean);
    saveDeck();
    renderDeckBadge();
    updateDeckTitle(deck);
    openDeckPanel();
    return true;
  };
  // RECIPES がまだ読み込まれていない場合に備えて遅延リトライ
  if (!apply()) {
    let tries = 0;
    const timer = setInterval(() => {
      if (apply() || ++tries > 40) clearInterval(timer);
    }, 100);
  }
}

// レシピの共有URL（静的OGPページ）をコピーする。
function copyRecipeURL(recipeId) {
  const base = location.pathname.replace(/\/[^/]*$/, '');
  const url = `${location.origin}${base}/recipe/${recipeId}/`;
  navigator.clipboard.writeText(url)
    .then(() => showToast('レシピのURLをコピーしました'))
    .catch(() => showToast('コピーに失敗しました'));
}

function loadRecipe(recipeId) {
  if (!isHofReady()) { showToast('読込中... 少し待ってからお試しください'); return; }
  const recipe = RECIPES.find(r => r.id === recipeId);
  if (!recipe) { showToast('レシピが見つかりません'); return; }
  if (deck.length && !confirm('現在のデッキを上書きしますか？')) return;
  deck = (recipe.cards || [])
    .map(rc => {
      const card = cardById(rc.id);
      if (!card) return null;
      return { id: rc.id, name: card.name, count: Math.min(CARD_MAX, Math.max(1, rc.count | 0)) };
    })
    .filter(Boolean);
  saveDeck();
  renderDeckBadge();
  document.getElementById('mobileDetail').classList.add('hidden');
  openDeckPanel();
  showToast(`「${recipe.name || 'デッキ'}」を読み込みました`);
}

let toastTimer = null;

loadDeck();

// デッキFAB 吹き出し：初回のみ表示
if (!localStorage.getItem('dm_tooltip_seen')) {

// ===== AIチャット（ローカルLLM / ngrok経由） =====
let chatHistory = [];   // { role:'user'|'assistant', content } の往復履歴
let chatBusy = false;

// health で FAB を出し分け（落ちていれば非表示＝「今は使えません」）
async function pollChatHealth() {
  // CHAT_API_BASE 未設定（プレースホルダのまま）なら問い合わせずFAB非表示のまま
  if (CHAT_API_BASE.includes('YOUR-DOMAIN')) {
    document.getElementById('chatFab').classList.add('hidden');
    return;
  }
  try {
    const r = await fetch(CHAT_API_BASE + '/api/health', { headers: CHAT_HEADERS });
    const j = await r.json();
    document.getElementById('chatFab').classList.toggle('hidden', !j.up);
  } catch {
    document.getElementById('chatFab').classList.add('hidden');
  }
}
window.addEventListener('load', pollChatHealth);

function openChatSheet() {
  document.getElementById('chatSheet').classList.remove('hidden');
  document.getElementById('chatInput').focus();
}

function closeChatSheet(e) {
  if (!e || e.target === document.getElementById('chatSheet')) {
    document.getElementById('chatSheet').classList.add('hidden');
  }
}

function resetChat() {
  chatHistory = [];
  document.getElementById('chatLog').innerHTML = '';
}

function chatUseExample(btn) {
  document.getElementById('chatInput').value = btn.textContent;
  sendChat();
}

function chatErrorMessage(code) {
  if (code === 'BUSY') return '混んでいます。少し待ってからもう一度お試しください。';
  if (code === 'RATE_LIMIT') return 'アクセスが集中しています。少し待ってからお試しください。';
  return '今は使えません。時間をおいてお試しください。';
}

function appendUserBubble(text) {
  const log = document.getElementById('chatLog');
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-end';
  wrap.innerHTML = `<div class="bg-emerald-600 text-white text-sm rounded-2xl rounded-br-sm px-3 py-2 max-w-[80%] whitespace-pre-wrap break-words"></div>`;
  wrap.firstChild.textContent = text;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
}

// アシスタントの吹き出しを追加し、本文textを持つ要素を返す
function appendAssistantBubble() {
  const log = document.getElementById('chatLog');
  const wrap = document.createElement('div');
  wrap.className = 'flex flex-col items-start gap-2';
  const text = document.createElement('div');
  text.className = 'bg-gray-100 text-gray-800 text-sm rounded-2xl rounded-bl-sm px-3 py-2 max-w-[90%] whitespace-pre-wrap break-words';
  wrap.appendChild(text);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return text;
}

// 根拠カードを既存のカード表示（civ色・コスト/パワー等）に寄せてDB実値で描画
function renderCardCards(bubble, cards) {
  const wrap = bubble.parentElement;
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-2 w-full';
  grid.innerHTML = cards.map(renderCardCard).join('');
  wrap.appendChild(grid);
  document.getElementById('chatLog').scrollTop = document.getElementById('chatLog').scrollHeight;
}

function renderCardCard(card) {
  const civs = civBadge(card.civilizations || []);
  const meta = `${escapeHtml(card.cardType)}・${card.cost ?? '—'}コスト${card.power !== null && card.power !== undefined ? ` / ${card.power.toLocaleString()}P` : ''}`;
  const races = (card.races && card.races.length) ? `<div class="text-xs text-gray-400 truncate">${escapeHtml(card.races.join('/'))}</div>` : '';
  return `
    <div class="border border-gray-100 rounded-lg p-2 cursor-pointer hover:bg-gray-50" onclick="closeChatSheet();selectCard('${card.id}')">
      <div class="flex items-center gap-2">
        <img src="https://dm.takaratomy.co.jp/wp-content/card/cardimage/${card.id}.jpg"
          alt="" loading="lazy"
          onerror="this.parentNode.querySelector('.card-img-placeholder').style.display='flex';this.style.display='none'"
          class="w-[40px] h-[56px] object-cover rounded shrink-0 bg-gray-100">
        <div class="card-img-placeholder w-[40px] h-[56px] rounded shrink-0 bg-gray-100 hidden items-center justify-center text-gray-300 text-base">🎴</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold text-xs text-gray-900 truncate">${escapeHtml(card.name)}</div>
          <div class="text-xs text-gray-500 mt-0.5 flex items-center gap-1 flex-wrap">${civs}</div>
          <div class="text-xs text-gray-500 truncate">${meta}</div>
          ${races}
        </div>
      </div>
    </div>`;
}

async function chatAsk(question, history) {
  const res = await fetch(CHAT_API_BASE + '/api/chat', {
    method: 'POST',
    headers: { 'content-type': 'application/json', ...CHAT_HEADERS },
    body: JSON.stringify({ question, history }),
  });
  const bubble = appendAssistantBubble();
  if (!res.ok || !res.body) {
    bubble.textContent = chatErrorMessage(res.status === 429 ? 'RATE_LIMIT' : 'ERROR');
    return '';
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '', assistant = '', final = null;
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf('\n')) >= 0) {
      const line = buf.slice(0, i).trim(); buf = buf.slice(i + 1);
      if (!line.startsWith('data:')) continue;
      let ev;
      try { ev = JSON.parse(line.slice(5).trim()); } catch { continue; }
      if (ev.token) { assistant += ev.token; bubble.textContent = assistant; }
      if (ev.done) final = ev;
      document.getElementById('chatLog').scrollTop = document.getElementById('chatLog').scrollHeight;
    }
  }
  if (final?.error) bubble.textContent = chatErrorMessage(final.error);
  if (final?.cards?.length) renderCardCards(bubble, final.cards);
  return assistant;
}

async function sendChat() {
  if (chatBusy) return;
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;
  chatBusy = true;
  input.value = '';
  document.getElementById('chatSendBtn').disabled = true;
  appendUserBubble(question);
  const history = chatHistory.slice();
  chatHistory.push({ role: 'user', content: question });
  try {
    const answer = await chatAsk(question, history);
    if (answer) chatHistory.push({ role: 'assistant', content: answer });
  } catch {
    appendAssistantBubble().textContent = chatErrorMessage('ERROR');
  } finally {
    chatBusy = false;
    document.getElementById('chatSendBtn').disabled = false;
    input.focus();
  }
}
</script>

<!-- PWA: Service Worker 登録 + インストールプロンプト制御 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

(function () {
  const DISMISS_KEY = 'dm_pwa_dismissed_until';
  let deferredPrompt = null;

  const btn = () => document.getElementById('pwaInstallBtn');

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function dismissedRecently() {
    const until = Number(localStorage.getItem(DISMISS_KEY) || 0);
    return Date.now() < until;
  }

  function showBtn() {
    if (isStandalone() || dismissedRecently()) return;
    const b = btn();
    if (b) b.classList.remove('hidden');
  }

  function hideBtn() {
    const b = btn();
    if (b) b.classList.add('hidden');
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showBtn();
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    hideBtn();
  });

  window.pwaInstall = async function () {
    if (!deferredPrompt) { hideBtn(); return; }
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    hideBtn();
    if (outcome === 'dismissed') {
      localStorage.setItem(DISMISS_KEY, String(Date.now() + 7 * 24 * 60 * 60 * 1000));
    }
  };
})();
</script>
