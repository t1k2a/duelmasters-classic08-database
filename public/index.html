<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デュエマ クラシック08 カード検索</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .civ-光  { background:#fef9c3; border-color:#ca8a04; color:#713f12; }
    .civ-水  { background:#dbeafe; border-color:#3b82f6; color:#1e3a8a; }
    .civ-闇  { background:#f3e8ff; border-color:#9333ea; color:#581c87; }
    .civ-火  { background:#fee2e2; border-color:#ef4444; color:#7f1d1d; }
    .civ-自然 { background:#dcfce7; border-color:#22c55e; color:#14532d; }
    .rarity-SR { color:#b45309; font-weight:700; }
    .rarity-VR { color:#7c3aed; font-weight:700; }
    .rarity-R  { color:#1d4ed8; font-weight:600; }
    .rarity-U  { color:#047857; font-weight:600; }
    .rarity-C  { color:#374151; }
    .card-row:hover { background:#f9fafb; }
    .card-row.selected { background:#eff6ff; border-left:3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ヘッダー -->
<header class="bg-indigo-700 text-white px-4 py-3 flex items-center gap-3 shadow-md sticky top-0 z-20">
  <span class="text-lg font-bold tracking-wide">🎴 デュエマ クラシック08 カード検索</span>
  <span id="cardCountBadge" class="ml-auto text-indigo-200 text-sm hidden md:block"></span>
</header>

<div class="flex h-[calc(100vh-52px)]">

  <!-- ========== 左カラム: フィルター（PC のみ w-56）========== -->
  <aside class="hidden md:flex flex-col w-56 bg-white border-r border-gray-200 overflow-y-auto shrink-0">
    <div class="p-4 space-y-5 text-sm">

      <!-- 文明 -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">文明</p>
        <div class="space-y-1">
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="civ-cb accent-indigo-600" value="光" checked> <span class="civ-光 border rounded-full px-2 py-0.5 text-xs">光</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="civ-cb accent-indigo-600" value="水" checked> <span class="civ-水 border rounded-full px-2 py-0.5 text-xs">水</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="civ-cb accent-indigo-600" value="闇" checked> <span class="civ-闇 border rounded-full px-2 py-0.5 text-xs">闇</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="civ-cb accent-indigo-600" value="火" checked> <span class="civ-火 border rounded-full px-2 py-0.5 text-xs">火</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="civ-cb accent-indigo-600" value="自然" checked> <span class="civ-自然 border rounded-full px-2 py-0.5 text-xs">自然</span></label>
        </div>
      </div>

      <!-- コスト -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">コスト</p>
        <div class="flex items-center gap-2">
          <input id="costMin" type="number" min="1" max="15" placeholder="1" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
          <span class="text-gray-400">〜</span>
          <input id="costMax" type="number" min="1" max="15" placeholder="15" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
      </div>

      <!-- パワー -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">パワー</p>
        <div class="flex items-center gap-2">
          <input id="powerMin" type="number" step="1000" placeholder="—" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
          <span class="text-gray-400">〜</span>
          <input id="powerMax" type="number" step="1000" placeholder="—" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
        </div>
      </div>

      <!-- カードの種類 -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">カードの種類</p>
        <select id="cardType" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
          <option value="">すべて</option>
          <option>クリーチャー</option>
          <option>進化クリーチャー</option>
          <option>呪文</option>
          <option>クロスギア</option>
          <option>城</option>
        </select>
      </div>

      <!-- 種族 -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">種族</p>
        <input id="race" type="text" placeholder="ドラゴン など" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
      </div>

      <!-- パック -->
      <div>
        <p class="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wide">パック</p>
        <select id="setFilter" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
          <option value="">すべて</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- ========== 中央カラム: 検索バー＋カードリスト（PC w-56、モバイル flex-1）========== -->
  <div class="flex-1 md:flex-none md:w-56 flex flex-col overflow-hidden border-r border-gray-200 bg-gray-50">

    <!-- テキスト検索バー -->
    <div class="bg-white border-b border-gray-200 px-4 py-3">
      <input id="textSearch" type="text" placeholder="カード名・テキストで検索..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">

      <!-- スマホ用インラインフィルター -->
      <div class="mt-3 md:hidden space-y-2">
        <div class="flex gap-2 flex-wrap" id="mobileCivTags">
          <button onclick="toggleMobileCiv(this,'光')"  data-civ="光"  data-on="1" class="civ-光  border rounded-full px-3 py-0.5 text-xs font-medium">光</button>
          <button onclick="toggleMobileCiv(this,'水')"  data-civ="水"  data-on="1" class="civ-水  border rounded-full px-3 py-0.5 text-xs font-medium">水</button>
          <button onclick="toggleMobileCiv(this,'闇')"  data-civ="闇"  data-on="1" class="civ-闇  border rounded-full px-3 py-0.5 text-xs font-medium">闇</button>
          <button onclick="toggleMobileCiv(this,'火')"  data-civ="火"  data-on="1" class="civ-火  border rounded-full px-3 py-0.5 text-xs font-medium">火</button>
          <button onclick="toggleMobileCiv(this,'自然')" data-civ="自然" data-on="1" class="civ-自然 border rounded-full px-3 py-0.5 text-xs font-medium">自然</button>
        </div>
        <div class="flex gap-2">
          <select id="mobileCardType" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="">種類: すべて</option>
            <option>クリーチャー</option>
            <option>進化クリーチャー</option>
            <option>呪文</option>
            <option>クロスギア</option>
            <option>城</option>
          </select>
          <select id="mobileCostMax" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="">コスト: すべて</option>
            <option value="2">〜2</option>
            <option value="4">〜4</option>
            <option value="6">〜6</option>
            <option value="8">〜8</option>
          </select>
        </div>
        <select id="mobileSetFilter" class="w-full border border-gray-300 rounded px-2 py-1 text-xs">
          <option value="">パック: すべて</option>
        </select>
      </div>
    </div>

    <!-- カードリスト -->
    <div class="flex-1 overflow-y-auto">
      <div class="px-4 py-2 text-xs text-gray-500 bg-gray-50 border-b border-gray-100" id="resultCount">読み込み中...</div>
      <div id="cardList" class="divide-y divide-gray-100">
        <!-- ローディング表示 -->
        <div id="loadingMsg" class="px-4 py-8 text-center text-gray-400 text-sm">
          カードデータを読み込み中...
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 右カラム: カード詳細パネル（PC のみ flex-1）========== -->
  <div id="detailPanel" class="hidden md:flex flex-col flex-1 bg-white border-l border-gray-200 overflow-y-auto">
    <div class="p-5 text-sm text-gray-400 text-center mt-8">カードをクリックすると<br>詳細が表示されます</div>
  </div>

</div>

<!-- スマホ詳細 モーダル（fixed 配置のため flex コンテナ外） -->
<div id="mobileDetail" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="closeMobileDetail(event)">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[80vh] overflow-y-auto p-5" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h2 id="mobileDetailName" class="font-bold text-base"></h2>
      <button onclick="closeMobileDetail()" class="text-gray-400 text-xl leading-none">&times;</button>
    </div>
    <div id="mobileDetailBody"></div>
  </div>
</div>

<script>
let CARDS = [];
let DM_SET_MAP = new Map(); // "DM-01" → "DM-01 拡張パック 第1弾"
const CIV_COLORS = {光:'civ-光',水:'civ-水',闇:'civ-闇',火:'civ-火',自然:'civ-自然'};
let selectedCard = null;
let mobileCivFilter = new Set(['光','水','闇','火','自然']);
let debounceTimer = null;

function buildSetMap(cards) {
  const map = new Map();
  for (const card of cards) {
    for (const s of card.setsContaining) {
      const m = s.match(/^(DM-\d+)/);
      if (m && !map.has(m[1])) map.set(m[1], s);
    }
    for (const pr of card.printings) {
      if (pr.setCode && !map.has(pr.setCode)) map.set(pr.setCode, pr.setCode);
    }
  }
  return map;
}

function setShortName(setCode) {
  const full = DM_SET_MAP.get(setCode) || setCode;
  return full.replace(/^DM-\d+\s*/, '');
}

function populateSetSelects() {
  const opts = Array.from(DM_SET_MAP.entries())
    .filter(([c]) => /^DM-\d+$/.test(c))
    .sort((a, b) => parseInt(a[0].slice(3)) - parseInt(b[0].slice(3)))
    .map(([code, name]) => `<option value="${code}">${name}</option>`)
    .join('');
  document.getElementById('setFilter').insertAdjacentHTML('beforeend', opts);
  document.getElementById('mobileSetFilter').insertAdjacentHTML('beforeend', opts);
}

// cards.json を取得してUIを初期化
fetch('cards.json')
  .then(r => r.json())
  .then(data => {
    CARDS = data;
    DM_SET_MAP = buildSetMap(CARDS);
    populateSetSelects();
    document.getElementById('loadingMsg')?.remove();
    document.getElementById('cardCountBadge').textContent = `${CARDS.length.toLocaleString()} 枚収録`;
    renderList();
  })
  .catch(() => {
    document.getElementById('loadingMsg').textContent = '読み込みに失敗しました。cards.json が存在するか確認してください。';
  });

function civBadge(civs) {
  return civs.map(c =>
    `<span class="${CIV_COLORS[c]||''} border rounded-full px-2 py-0.5 text-xs">${c}</span>`
  ).join(' ');
}

function rarityClass(r) { return `rarity-${r}`; }

function getFilters() {
  const text = document.getElementById('textSearch').value.trim().toLowerCase();
  const pcCivs = [...document.querySelectorAll('.civ-cb:checked')].map(e => e.value);
  const isMobile = window.innerWidth < 768;
  const civs = isMobile ? [...mobileCivFilter] : pcCivs;
  const costMin = parseInt(document.getElementById('costMin')?.value || '') || 0;
  const costMax = parseInt(document.getElementById('costMax')?.value || '') || 99;
  const powerMin = parseInt(document.getElementById('powerMin')?.value || '') || 0;
  const powerMax = parseInt(document.getElementById('powerMax')?.value || '') || 999999;
  const type = (isMobile ? document.getElementById('mobileCardType') : document.getElementById('cardType'))?.value || '';
  const race = document.getElementById('race')?.value.trim().toLowerCase() || '';
  const mCostMax = parseInt(document.getElementById('mobileCostMax')?.value || '') || 99;
  const setCode = (isMobile ? document.getElementById('mobileSetFilter') : document.getElementById('setFilter'))?.value || '';
  return { text, civs, costMin, costMax: isMobile ? mCostMax : costMax, powerMin, powerMax, type, race, setCode };
}

function filterCards() {
  const { text, civs, costMin, costMax, powerMin, powerMax, type, race, setCode } = getFilters();
  return CARDS.filter(c => {
    if (text && !c.name.toLowerCase().includes(text) && !(c.text || '').toLowerCase().includes(text)) return false;
    if (civs.length && !c.civilizations.some(cv => civs.includes(cv))) return false;
    if (c.cost !== null && (c.cost < costMin || c.cost > costMax)) return false;
    if (c.power !== null && (c.power < powerMin || c.power > powerMax)) return false;
    if (type && c.cardType !== type) return false;
    if (race && !c.races.join('/').toLowerCase().includes(race)) return false;
    if (setCode && !c.printings.some(p => p.setCode === setCode)) return false;
    return true;
  });
}

function renderList() {
  const results = filterCards();
  document.getElementById('resultCount').textContent = `${CARDS.length.toLocaleString()}件中 ${results.length.toLocaleString()}件`;
  const p = c => c.printings[0] || {};
  document.getElementById('cardList').innerHTML = results.map(c => `
    <div class="card-row px-4 py-3 cursor-pointer ${selectedCard === c.id ? 'selected' : ''}"
         onclick="selectCard('${c.id}')">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <div class="font-semibold text-sm text-gray-900 truncate">${c.name}</div>
          <div class="text-xs text-gray-500 mt-0.5">
            ${c.cardType}・${civBadge(c.civilizations)}・${c.cost ?? '—'}コスト${c.power !== null ? ` / ${c.power.toLocaleString()}P` : ''}
          </div>
          ${c.races.length ? `<div class="text-xs text-gray-400">${c.races.join('/')}</div>` : ''}
        </div>
        <div class="text-right shrink-0">
          <div class="text-xs ${rarityClass(c.rarity)}">${c.rarity ?? ''}</div>
          <div class="text-xs text-gray-500 mt-0.5">${p(c).setCode ?? ''}</div>
          <div class="text-xs text-gray-400 leading-tight">${setShortName(p(c).setCode ?? '')}</div>
          <div class="text-xs text-gray-300">${p(c).cardNumber ?? ''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function detailHTML(c) {
  const p = c.printings[0] || {};

  // 収録セット一覧（DM printings + DMC/DMS from setsContaining）
  const dmPrintings = c.printings.map(pr =>
    `<span class="inline-block bg-gray-100 text-gray-600 text-xs rounded px-2 py-0.5">${pr.setCode} ${pr.cardNumber} <span class="${rarityClass(pr.rarity)}">${pr.rarity ?? ''}</span></span>`
  ).join(' ');

  const dmcSets = (c.setsContaining || [])
    .filter(s => /DMC|DMS/.test(s))
    .map(s => {
      const code = s.match(/^(DMC|DMS)-?\d+/)?.[0] || s.substring(0, 6);
      return `<span class="inline-block bg-purple-50 border border-purple-200 text-purple-700 text-xs rounded px-2 py-0.5">${code}</span>`;
    }).join(' ');

  return `
    <div class="space-y-4">
      <div class="flex justify-center">
        <img
          src="https://dm.takaratomy.co.jp/wp-content/card/cardimage/${c.id}.jpg"
          alt="${c.name.replace(/"/g, '&quot;')}"
          onerror="this.style.display='none'"
          class="rounded-lg shadow-md max-w-[200px] w-full">
      </div>
      <div class="flex flex-wrap gap-1">${civBadge(c.civilizations)}</div>
      <table class="text-sm w-full">
        <tr><td class="text-gray-500 pr-3 py-0.5 w-24">カードの種類</td><td class="font-medium">${c.cardType}</td></tr>
        <tr><td class="text-gray-500 pr-3 py-0.5">コスト</td><td class="font-medium">${c.cost ?? '—'}</td></tr>
        ${c.power !== null ? `<tr><td class="text-gray-500 pr-3 py-0.5">パワー</td><td class="font-medium">${c.power.toLocaleString()}</td></tr>` : ''}
        ${c.races.length ? `<tr><td class="text-gray-500 pr-3 py-0.5">種族</td><td class="font-medium">${c.races.join(' / ')}</td></tr>` : ''}
      </table>
      ${c.text ? `
        <div>
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">能力テキスト</div>
          <div class="text-sm bg-gray-50 rounded p-2 whitespace-pre-wrap leading-relaxed">${c.text}</div>
        </div>` : ''}
      <div>
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">DM収録</div>
        <div class="flex flex-wrap gap-1">${dmPrintings}</div>
      </div>
      ${dmcSets ? `
        <div>
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">DMC/DMS 再録</div>
          <div class="flex flex-wrap gap-1">${dmcSets}</div>
        </div>` : ''}
      <div>
        <a href="https://dm.takaratomy.co.jp/card/detail/?id=${c.id}"
           target="_blank" rel="noopener noreferrer"
           class="text-xs text-indigo-600 hover:text-indigo-800 hover:underline">
          公式サイトで見る →
        </a>
      </div>
    </div>
  `;
}

function selectCard(id) {
  const c = CARDS.find(x => x.id === id);
  if (!c) return;
  selectedCard = id;
  renderList();

  if (window.innerWidth >= 768) {
    document.getElementById('detailPanel').innerHTML = `
      <div class="p-4 border-b border-gray-100">
        <div class="text-xs text-gray-400 mb-1">カード詳細</div>
        <h2 class="font-bold text-sm">${c.name}</h2>
      </div>
      <div class="p-4">${detailHTML(c)}</div>
    `;
  } else {
    document.getElementById('mobileDetailName').textContent = c.name;
    document.getElementById('mobileDetailBody').innerHTML = detailHTML(c);
    document.getElementById('mobileDetail').classList.remove('hidden');
  }
}

function closeMobileDetail(e) {
  if (!e || e.target === document.getElementById('mobileDetail')) {
    document.getElementById('mobileDetail').classList.add('hidden');
  }
}

function toggleMobileCiv(btn, civ) {
  if (mobileCivFilter.has(civ)) {
    mobileCivFilter.delete(civ);
    btn.classList.add('opacity-30');
  } else {
    mobileCivFilter.add(civ);
    btn.classList.remove('opacity-30');
  }
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderList, 200);
}

['textSearch','costMin','costMax','powerMin','powerMax','cardType','race','mobileCardType','mobileCostMax','setFilter','mobileSetFilter']
  .forEach(id => document.getElementById(id)?.addEventListener('input', scheduleUpdate));
document.querySelectorAll('.civ-cb').forEach(cb => cb.addEventListener('change', scheduleUpdate));
</script>
</body>
</html>
