<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デュエマ クラシック08 カード検索</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .civ-光  { background:#fef9c3; border-color:#ca8a04; color:#713f12; }
    .civ-水  { background:#dbeafe; border-color:#3b82f6; color:#1e3a8a; }
    .civ-闇  { background:#f3e8ff; border-color:#9333ea; color:#581c87; }
    .civ-火  { background:#fee2e2; border-color:#ef4444; color:#7f1d1d; }
    .civ-自然 { background:#dcfce7; border-color:#22c55e; color:#14532d; }
    .rarity-SR { color:#b45309; font-weight:700; }
    .rarity-VR { color:#7c3aed; font-weight:700; }
    .rarity-R  { color:#1d4ed8; font-weight:600; }
    .rarity-U  { color:#047857; font-weight:600; }
    .rarity-C  { color:#374151; }
    .card-row:hover { background:#f9fafb; }
    .card-row.selected { background:#eff6ff; border-left:3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-300 min-h-screen">

<!-- ヘッダー（全幅） -->
<header class="bg-indigo-700 text-white px-4 py-3 flex items-center gap-3 shadow-md sticky top-0 z-20">
  <span class="text-lg font-bold tracking-wide">🎴 デュエマ クラシック08 カード検索</span>
  <span id="cardCountBadge" class="ml-auto text-indigo-200 text-sm"></span>
</header>

<!-- LP ラッパー: SP幅を中央に配置 -->
<div class="flex justify-center min-h-[calc(100vh-52px)]">
  <div class="w-full max-w-[430px] bg-gray-50 flex flex-col shadow-2xl" style="height:calc(100vh - 52px); overflow:hidden;">

    <!-- 検索バー + フィルター -->
    <div class="bg-white border-b border-gray-200 px-4 py-3 flex-shrink-0">
      <input id="textSearch" type="text" placeholder="カード名・テキストで検索..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">

      <div class="mt-3 space-y-2">
        <!-- 絞り込み セクション -->
        <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide">絞り込み</p>
        <!-- 文明タグ -->
        <div class="flex gap-2 flex-wrap" id="mobileCivTags">
          <button onclick="toggleMobileCiv(this,'光')"  data-civ="光"  data-on="1" class="civ-光  border rounded-full px-3 py-0.5 text-xs font-medium">光</button>
          <button onclick="toggleMobileCiv(this,'水')"  data-civ="水"  data-on="1" class="civ-水  border rounded-full px-3 py-0.5 text-xs font-medium">水</button>
          <button onclick="toggleMobileCiv(this,'闇')"  data-civ="闇"  data-on="1" class="civ-闇  border rounded-full px-3 py-0.5 text-xs font-medium">闇</button>
          <button onclick="toggleMobileCiv(this,'火')"  data-civ="火"  data-on="1" class="civ-火  border rounded-full px-3 py-0.5 text-xs font-medium">火</button>
          <button onclick="toggleMobileCiv(this,'自然')" data-civ="自然" data-on="1" class="civ-自然 border rounded-full px-3 py-0.5 text-xs font-medium">自然</button>
        </div>
        <!-- カード種類 + コスト -->
        <div class="flex gap-2">
          <select id="mobileCardType" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="">種類: すべて</option>
            <option value="クリーチャー">クリーチャー</option>
            <option value="進化クリーチャー">進化クリーチャー</option>
            <option value="進化クリーチャー(進化V)">進化ボルテックス</option>
            <option value="進化クリーチャー(進化GV)">進化GV</option>
            <option value="進化クリーチャー(マナ進化)">マナ進化</option>
            <option value="呪文">呪文</option>
            <option value="クロスギア">クロスギア</option>
            <option value="進化クロスギア">進化クロスギア</option>
            <option value="城">城</option>
          </select>
          <select id="mobileCostMax" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="">コスト: すべて</option>
            <option value="max:2">〜2</option>
            <option value="range:3:5">3〜5</option>
            <option value="range:6:8">6〜8</option>
            <option value="min:9">9以上</option>
          </select>
        </div>
        <!-- 種族 + パック -->
        <select id="mobileRaceFilter" class="w-full border border-gray-300 rounded px-2 py-1 text-xs">
          <option value="">種族: すべて</option>
        </select>
        <select id="mobileSetFilter" class="w-full border border-gray-300 rounded px-2 py-1 text-xs">
          <option value="">パック: すべて</option>
        </select>

        <!-- 区切り -->
        <hr class="border-gray-200">

        <!-- ソート セクション -->
        <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide">ソート</p>
        <div class="flex gap-2">
          <select id="sortKey" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="">デフォルト</option>
            <option value="name">名前順</option>
            <option value="cost">マナ順</option>
            <option value="power">攻撃力順</option>
            <option value="rarity">レアリティ順</option>
          </select>
          <select id="sortDir" class="w-20 border border-gray-300 rounded px-2 py-1 text-xs">
            <option value="asc">昇順 ↑</option>
            <option value="desc">降順 ↓</option>
          </select>
        </div>
      </div>
    </div>

    <!-- カードリスト -->
    <div class="flex-1 overflow-y-auto">
      <div class="px-4 py-2 text-xs text-gray-500 bg-gray-50 border-b border-gray-100" id="resultCount">読み込み中...</div>
      <div id="cardList" class="divide-y divide-gray-100">
        <div id="loadingMsg" class="px-4 py-8 text-center text-gray-400 text-sm">
          カードデータを読み込み中...
        </div>
      </div>
    </div>

  </div>
</div>

<!-- カード詳細 ボトムシート（全幅） -->
<div id="mobileDetail" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="closeDetail(event)">
  <div class="absolute bottom-0 left-0 right-0 flex justify-center" onclick="event.stopPropagation()">
    <div class="w-full max-w-[430px] bg-white rounded-t-2xl max-h-[85vh] overflow-y-auto p-5">
      <div class="flex justify-between items-start gap-3 mb-4">
        <h2 id="detailName" class="font-bold text-base leading-snug min-w-0 break-words"></h2>
        <button onclick="closeDetail()" class="text-gray-400 text-xl leading-none shrink-0">&times;</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>
</div>

<script>
let CARDS = [];
let DM_SET_MAP = new Map();
const CIV_COLORS = {光:'civ-光',水:'civ-水',闇:'civ-闇',火:'civ-火',自然:'civ-自然'};
let selectedCard = null;
let mobileCivFilter = new Set(['光','水','闇','火','自然']);
let debounceTimer = null;

function buildSetMap(cards) {
  const map = new Map();
  for (const card of cards) {
    for (const s of card.setsContaining) {
      const m = s.match(/^(DM-\d+)/);
      if (m && !map.has(m[1])) map.set(m[1], s);
    }
    for (const pr of card.printings) {
      if (pr.setCode && !map.has(pr.setCode)) map.set(pr.setCode, pr.setCode);
    }
  }
  return map;
}

function setShortName(setCode) {
  const full = DM_SET_MAP.get(setCode) || setCode;
  return full.replace(/^DM-\d+\s*/, '');
}

function populateSetSelects() {
  const opts = Array.from(DM_SET_MAP.entries())
    .filter(([c]) => /^DM-\d+$/.test(c))
    .sort((a, b) => parseInt(a[0].slice(3)) - parseInt(b[0].slice(3)))
    .map(([code, name]) => `<option value="${code}">${name}</option>`)
    .join('');
  document.getElementById('mobileSetFilter').insertAdjacentHTML('beforeend', opts);
}

function populateRaceSelect() {
  const races = new Set();
  for (const card of CARDS) {
    for (const r of card.races) races.add(r);
  }
  const opts = Array.from(races)
    .sort((a, b) => a.localeCompare(b, 'ja'))
    .map(r => `<option value="${r}">${r}</option>`)
    .join('');
  document.getElementById('mobileRaceFilter').insertAdjacentHTML('beforeend', opts);
}

fetch('cards.json')
  .then(r => r.json())
  .then(data => {
    CARDS = data;
    DM_SET_MAP = buildSetMap(CARDS);
    populateSetSelects();
    populateRaceSelect();
    document.getElementById('loadingMsg')?.remove();
    document.getElementById('cardCountBadge').textContent = `${CARDS.length.toLocaleString()} 枚収録`;
    renderList();
  })
  .catch(() => {
    document.getElementById('loadingMsg').textContent = '読み込みに失敗しました。';
  });

function civBadge(civs) {
  return civs.map(c =>
    `<span class="${CIV_COLORS[c]||''} border rounded-full px-2 py-0.5 text-xs">${c}</span>`
  ).join(' ');
}

function rarityClass(r) { return `rarity-${r}`; }

function getFilters() {
  const text = document.getElementById('textSearch').value.trim().toLowerCase();
  const civs = [...mobileCivFilter];
  const costVal = document.getElementById('mobileCostMax').value || '';
  const costParts = costVal ? costVal.split(':') : [];
  const costFilter = costVal ? { mode: costParts[0], n: parseInt(costParts[1]), n2: parseInt(costParts[2]) } : null;
  const type = document.getElementById('mobileCardType').value || '';
  const setCode = document.getElementById('mobileSetFilter').value || '';
  const race = document.getElementById('mobileRaceFilter').value || '';
  return { text, civs, costFilter, type, setCode, race };
}

function filterCards() {
  const { text, civs, costFilter, type, setCode, race } = getFilters();
  return CARDS.filter(c => {
    if (text && !c.name.toLowerCase().includes(text) && !(c.text || '').toLowerCase().includes(text)) return false;
    if (civs.length && !c.civilizations.some(cv => civs.includes(cv))) return false;
    if (costFilter) {
      if (costFilter.mode === 'max' && c.cost !== null && c.cost > costFilter.n) return false;
      if (costFilter.mode === 'min' && (c.cost === null || c.cost < costFilter.n)) return false;
      if (costFilter.mode === 'range' && (c.cost === null || c.cost < costFilter.n || c.cost > costFilter.n2)) return false;
    }
    if (type && c.cardType !== type) return false;
    if (setCode && !c.printings.some(p => p.setCode === setCode)) return false;
    if (race && !c.races.includes(race)) return false;
    return true;
  });
}

const RARITY_ORDER = { SR: 0, VR: 1, R: 2, U: 3, C: 4 };

function sortCards(cards) {
  const key = document.getElementById('sortKey').value;
  const desc = document.getElementById('sortDir').value === 'desc';
  if (!key) return cards;
  return [...cards].sort((a, b) => {
    let av, bv;
    if (key === 'name')   { av = a.name; bv = b.name; }
    if (key === 'cost')   { av = a.cost ?? 99; bv = b.cost ?? 99; }
    if (key === 'power')  { av = a.power ?? -1; bv = b.power ?? -1; }
    if (key === 'rarity') { av = RARITY_ORDER[a.rarity] ?? 9; bv = RARITY_ORDER[b.rarity] ?? 9; }
    if (av < bv) return desc ? 1 : -1;
    if (av > bv) return desc ? -1 : 1;
    return 0;
  });
}

function renderList() {
  const results = sortCards(filterCards());
  document.getElementById('resultCount').textContent = `${CARDS.length.toLocaleString()}件中 ${results.length.toLocaleString()}件`;
  const p = c => c.printings[0] || {};
  document.getElementById('cardList').innerHTML = results.map(c => `
    <div class="card-row px-3 py-2 cursor-pointer ${selectedCard === c.id ? 'selected' : ''}"
         onclick="selectCard('${c.id}')">
      <div class="flex items-center gap-3">
        <img
          src="https://dm.takaratomy.co.jp/wp-content/card/cardimage/${c.id}.jpg"
          alt=""
          loading="lazy"
          onerror="this.parentNode.querySelector('.card-img-placeholder').style.display='flex';this.style.display='none'"
          class="w-[52px] h-[72px] object-cover rounded shrink-0 bg-gray-100">
        <div class="card-img-placeholder w-[52px] h-[72px] rounded shrink-0 bg-gray-100 hidden items-center justify-center text-gray-300 text-xl">🎴</div>
        <div class="flex-1 flex items-start justify-between gap-2 min-w-0">
          <div class="min-w-0 flex-1">
            <div class="font-semibold text-sm text-gray-900 truncate">${c.name}</div>
            <div class="text-xs text-gray-500 mt-0.5 truncate">${c.cardType}・${civBadge(c.civilizations)}・${c.cost ?? '—'}コスト${c.power !== null ? ` / ${c.power.toLocaleString()}P` : ''}</div>
            ${c.races.length ? `<div class="text-xs text-gray-400 truncate">${c.races.join('/')}</div>` : ''}
          </div>
          <div class="text-right shrink-0 min-w-0 max-w-[88px]">
            <div class="text-xs ${rarityClass(c.rarity)}">${c.rarity ?? ''}</div>
            <div class="text-xs text-gray-500 mt-0.5">${p(c).setCode ?? ''}</div>
            <div class="text-xs text-gray-400 leading-tight truncate">${setShortName(p(c).setCode ?? '')}</div>
            <div class="text-xs text-gray-300">${p(c).cardNumber ?? ''}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function detailHTML(c) {
  const dmPrintings = c.printings.map(pr =>
    `<span class="inline-block bg-gray-100 text-gray-600 text-xs rounded px-2 py-0.5">${pr.setCode} ${pr.cardNumber} <span class="${rarityClass(pr.rarity)}">${pr.rarity ?? ''}</span></span>`
  ).join(' ');

  const dmcSets = (c.setsContaining || [])
    .filter(s => /DMC|DMS/.test(s))
    .map(s => {
      const code = s.match(/^(DMC|DMS)-?\d+/)?.[0] || s.substring(0, 6);
      return `<span class="inline-block bg-purple-50 border border-purple-200 text-purple-700 text-xs rounded px-2 py-0.5">${code}</span>`;
    }).join(' ');

  return `
    <div class="space-y-4">
      <div class="flex justify-center">
        <img
          src="https://dm.takaratomy.co.jp/wp-content/card/cardimage/${c.id}.jpg"
          alt="${c.name.replace(/"/g, '&quot;')}"
          onerror="this.style.display='none'"
          class="rounded-lg shadow-md max-w-[200px] w-full">
      </div>
      <div class="flex flex-wrap gap-1">${civBadge(c.civilizations)}</div>
      <table class="text-sm w-full">
        <tr><td class="text-gray-500 pr-3 py-0.5 w-24">カードの種類</td><td class="font-medium">${c.cardType}</td></tr>
        <tr><td class="text-gray-500 pr-3 py-0.5">コスト</td><td class="font-medium">${c.cost ?? '—'}</td></tr>
        ${c.power !== null ? `<tr><td class="text-gray-500 pr-3 py-0.5">パワー</td><td class="font-medium">${c.power.toLocaleString()}</td></tr>` : ''}
        ${c.races.length ? `<tr><td class="text-gray-500 pr-3 py-0.5">種族</td><td class="font-medium">${c.races.join(' / ')}</td></tr>` : ''}
      </table>
      ${c.text ? `
        <div>
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">能力テキスト</div>
          <div class="text-sm bg-gray-50 rounded p-2 whitespace-pre-wrap leading-relaxed">${c.text}</div>
        </div>` : ''}
      <div>
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">DM収録</div>
        <div class="flex flex-wrap gap-1">${dmPrintings}</div>
      </div>
      ${dmcSets ? `
        <div>
          <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">DMC/DMS 再録</div>
          <div class="flex flex-wrap gap-1">${dmcSets}</div>
        </div>` : ''}
      <div>
        <a href="https://dm.takaratomy.co.jp/card/detail/?id=${c.id}"
           target="_blank" rel="noopener noreferrer"
           class="text-xs text-indigo-600 hover:text-indigo-800 hover:underline">
          公式サイトで見る →
        </a>
      </div>
    </div>
  `;
}

function selectCard(id) {
  const c = CARDS.find(x => x.id === id);
  if (!c) return;
  selectedCard = id;
  renderList();
  document.getElementById('detailName').textContent = c.name;
  document.getElementById('detailBody').innerHTML = detailHTML(c);
  document.getElementById('mobileDetail').classList.remove('hidden');
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('mobileDetail')) {
    document.getElementById('mobileDetail').classList.add('hidden');
  }
}

function toggleMobileCiv(btn, civ) {
  if (mobileCivFilter.has(civ)) {
    mobileCivFilter.delete(civ);
    btn.classList.add('opacity-30');
  } else {
    mobileCivFilter.add(civ);
    btn.classList.remove('opacity-30');
  }
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderList, 200);
}

['textSearch','mobileCardType','mobileCostMax','mobileSetFilter','mobileRaceFilter','sortKey','sortDir']
  .forEach(id => document.getElementById(id)?.addEventListener('input', scheduleUpdate));
</script>
</body>
</html>
