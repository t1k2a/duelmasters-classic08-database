  <meta name="description" content="このクロスギアはマナゾーンにタップして置かれる。 進化-自分の火または自然のクロスギア１枚の上に置く。 これを クロスしたクリーチャーは、「パワーアタッカー+11000」と「T・ブレイカー」を得る。 これをクロスしたクリーチャーが進化クリーチャーではないアーマード・ドラゴンの場合、そのクリーチャーが攻撃する時、自分の山札を見る。その中から同じ名前のクリーチャーを１体、バトルゾーンにタップして出してもよい。その後、山札をシャッフルする。">
