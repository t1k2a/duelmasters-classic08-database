# Render Blueprint — チャットAPIサーバ (Groq プロバイダ)
# 使い方:
#   1. Render ダッシュボード → New → Blueprint → このリポジトリを選択
#   2. デプロイ時に GROQ_API_KEY を入力 (sync:false のため手動設定)
#   3. 公開後、public/index.html の CHAT_API_BASE を Render の URL に差し替え
# 無料プラン: 15分無アクセスでスリープ→次アクセスは復帰に約1分かかる点に注意。
services:
  - type: web
    name: dm-classic08-chat
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm run chat
    healthCheckPath: /api/health
    envVars:
      - key: CHAT_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MAX_TOKENS
        value: "512"
      - key: GROQ_API_KEY
        sync: false
